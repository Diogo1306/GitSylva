<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- GitSylva mark: the "S" drawn as a git-branch tree — tapering trunk,
       roots at the baseline, commit nodes and a leaf in the crown
       (variação B do handoff GitSylva-Logos; substitui o placeholder do template). -->
  <rect width="64" height="64" rx="15" fill="#14181B"/>
  <g fill="none" stroke="#7BC896" stroke-linecap="round">
    <!-- tapered S trunk (thick base, thin top) -->
    <path d="M22 55 C38 50 44 42 34 33" stroke-width="7"/>
    <path d="M34 33 C25 25 28 17 39 12" stroke-width="4"/>
    <!-- roots on the baseline -->
    <path d="M22 55 C18 56 15 58 12 58" stroke-width="3"/>
    <path d="M22 55 C26 57 30 58 33 58" stroke-width="3"/>
    <!-- crown branches -->
    <path d="M36 21 C42 19 46 19 51 21" stroke-width="2.6"/>
    <path d="M33 28 C27 26 22 26 17 28" stroke-width="2.6"/>
  </g>
  <!-- commit nodes (hollow, on the vine) -->
  <g fill="#14181B" stroke="#7BC896" stroke-width="2.6">
    <circle cx="51" cy="21" r="3.6"/>
    <circle cx="17" cy="28" r="3.6"/>
    <circle cx="39" cy="12" r="3.6"/>
  </g>
  <!-- one filled node + a leaf near the root -->
  <circle cx="44" cy="16" r="2.7" fill="#7BC896"/>
  <path d="M30 44 q7 -5 12 -2 q-5 7 -12 2 z" fill="#7BC896"/>
</svg>
