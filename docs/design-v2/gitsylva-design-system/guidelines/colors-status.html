<!-- @dsCard group="Colors" viewport="700x160" subtitle="add / modify / delete tints" name="Diff & file status" -->
<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>body{margin:0;font-family:var(--font-sans);background:var(--win);color:var(--text);padding:16px;box-sizing:border-box}</style>
</head><body>
<div style="display:flex;gap:10px;flex-wrap:wrap;font-family:var(--font-mono);font-size:11px">
<div style="padding:8px 12px;border-radius:8px;background:var(--daB);color:var(--daT)">added</div><div style="padding:8px 12px;border-radius:8px;background:var(--ddB);color:var(--ddT)">deleted</div><div style="padding:8px 12px;border-radius:8px;background:var(--stMB);color:var(--stMT)">modified</div><div style="padding:8px 12px;border-radius:8px;background:var(--dhB);color:var(--dhT)">hunk</div>
</div></body></html>
