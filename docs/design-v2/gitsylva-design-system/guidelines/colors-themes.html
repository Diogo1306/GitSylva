<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>body{margin:0;font-family:var(--font-sans);padding:16px;background:#e9e9e4;display:flex;gap:12px}</style></head><body>

<div data-theme="classic" style="width:150px">
  <div style="height:96px;border-radius:10px;overflow:hidden;display:flex;background:var(--win);border:1px solid var(--border)">
    <div style="width:34%;background:var(--panel);border-right:1px solid var(--border)"></div>
    <div style="flex:1;padding:10px;display:flex;flex-direction:column;gap:6px">
      <div style="height:6px;width:70%;border-radius:3px;background:var(--l0)"></div>
      <div style="height:6px;width:50%;border-radius:3px;background:var(--l1)"></div>
      <div style="height:6px;width:60%;border-radius:3px;background:var(--text2)"></div>
    </div>
  </div>
  <div style="font-size:11px;color:#333;margin-top:6px;text-align:center;font-family:var(--font-sans)">Clássico</div>
</div>
