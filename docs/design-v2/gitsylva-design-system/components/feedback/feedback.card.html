<!-- @dsCard group="Components" viewport="700x220" subtitle="Confirmations & results" name="Feedback — Toast, Notification" -->
<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../../styles.css">
<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>body{margin:0;font-family:var(--font-sans);background:var(--win);color:var(--text);padding:18px;box-sizing:border-box}.row{display:flex;gap:10px;align-items:center;flex-wrap:wrap}</style>
</head><body><div id="root"></div>
<script src="../../_ds_bundle.js"></script>
<script type="text/babel" data-presets="react">
  function findNS(need){ for(const k of Object.keys(window)){ const v=window[k]; if(v&&typeof v==='object'&&need.every(n=>n in v)) return v; } return window; }
  const NS = findNS(["Toast","Notification"]);
  const { Toast, Notification } = NS;
  
  ReactDOM.createRoot(document.getElementById('root')).render(
    <div style={{position:'relative',height:180}}>
      <div style={{position:'absolute',left:0,top:8}}><Notification title="Push concluído" sub="origin/main · 1 commit" style={{position:'static',width:300}}/></div>
      <div style={{position:'absolute',left:0,bottom:8}}><Toast style={{position:'static',transform:'none'}}>Branch main criada</Toast></div>
    </div>);
</script></body></html>
