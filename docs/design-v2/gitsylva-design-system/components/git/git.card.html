<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../../styles.css">
<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>body{margin:0;font-family:var(--font-sans);background:var(--win);color:var(--text);padding:18px;box-sizing:border-box}.row{display:flex;gap:10px;align-items:center;flex-wrap:wrap}</style>
</head><body><div id="root"></div>
<script src="../../_ds_bundle.js"></script>
<script type="text/babel" data-presets="react">
  function findNS(need){ for(const k of Object.keys(window)){ const v=window[k]; if(v&&typeof v==='object'&&need.every(n=>n in v)) return v; } return window; }
  const NS = findNS(["CommitRow","BranchItem","DiffLine"]);
  const { CommitRow, BranchItem, DiffLine } = NS;
  
  ReactDOM.createRoot(document.getElementById('root')).render(
    <div style={{display:'flex',flexDirection:'column',gap:12}}>
      <div style={{border:'1px solid var(--border)',borderRadius:8,overflow:'hidden'}}>
        <CommitRow message="Merge branch 'feature/graph'" chips={[{label:'main',lane:0}]} initials="AS" tone="AS" hash="a41f9c2" time="há 2 h" merge selected/>
        <CommitRow message="Animate lane transitions" chips={[{label:'feature/graph',lane:1}]} initials="MD" tone="MD" hash="f83b1d0" time="há 4 h"/>
      </div>
      <div className="row">
        <BranchItem name="main" lane={0} current/><BranchItem name="feature/graph-render" lane={1}/><BranchItem name="fix/parser" lane={2}/>
      </div>
      <div style={{border:'1px solid var(--border)',borderRadius:8,overflow:'hidden',background:'var(--panel2)',padding:'6px 0'}}>
        <DiffLine kind="hunk">@@ -42,7 +42,9 @@</DiffLine>
        <DiffLine kind="del">-  return x;</DiffLine>
        <DiffLine kind="add">+  return y;</DiffLine>
      </div>
    </div>);
</script></body></html>
